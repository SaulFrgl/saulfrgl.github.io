<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure</title>
    <style>
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        margin: 0;
        padding: 20px;
      }
      .title-container {
        position: relative;
        width: 40vw;
        height: 15vw;
        margin: 0 auto;
        cursor: pointer;
      }
      .title-base, .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <h1>Figure</h1>
    <p>Placeholder content.</p>
    <a href="index.html">Back to Home</a>
  </body>
</html>
