<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animations</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <style>
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      .title-container {
        position: relative;
        width: 30vw;
        height: 12vw;
        margin: 0 auto;
        cursor: pointer;
      }
      .title-base, .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 40px 0;
        gap: 20px;
      }
      .video-wrapper {
        width: min(80vw, 800px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .title-image {
        width: 250px;
        height: 120px;
        background-image: url("assets/NAME01.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin: 0 auto;
      }
      iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        max-width: 800px;
      }
    </style>
  </head>
  <body>
    <header>
        <a href="index.html">
            <div class="title-container">
                <div class="title-base"></div>
                <div class="title-hover"></div>
            </div>
        </a>
    </header>
    <div class="section">
      <div class="video-wrapper">
        <div class="title-image"></div>
        <iframe src="https://www.youtube.com/embed/Aqc_hZHWPI4?si=kQJUtIvsSLauPiF0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>
    <div class="section">

      </div>
    </div>
    <div class="section">
      <div class="video-wrapper">
        <div class="title-image"></div>
        <iframe src="https://www.youtube.com/embed/Aqc_hZHWPI4?si=kQJUtIvsSLauPiF0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>
    <div class="section">

        <div class="title-image"></div>

  </body>
</html>
