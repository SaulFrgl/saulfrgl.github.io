<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animations</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <link rel="preload" href="assets/SAUL02 NO TABLE.png" as="image" />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 112px 20px 20px;
        font-family: Arial, sans-serif;
        position: relative;
        overflow-y: scroll;
        overflow-x: hidden;
      }
      header {
        position: fixed;
        top: 4px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        line-height: 0;
        z-index: 10;
      }
      header a { display: block; }
      .saul-container {
        position: fixed;
        right: 4vw;
        bottom: 0;
        width: min(26vw, 30vh);
        aspect-ratio: 2282 / 955;
        cursor: pointer;
        z-index: 2;
      }
      .saul-base,
      .saul-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        transition: opacity 0.3s;
      }
      .saul-base {
        background-image: url("assets/SAUL01 NO TABLE.png");
        opacity: 1;
      }
      .saul-hover {
        background-image: url("assets/SAUL02 NO TABLE.png");
        opacity: 0;
      }
      .saul-container:hover .saul-base {
        opacity: 0;
      }
      .saul-container:hover .saul-hover {
        opacity: 1;
      }
      @media (orientation: portrait) {
        .saul-container {
          right: 2vw;
          bottom: 0;
          width: min(44vw, 22vh);
        }
      }
      .title-container {
        position: relative;
        width: 945px;
        height: 248px;
        margin: 0 auto 4px;
        cursor: pointer;
      }
      .title-base,
      .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 60px 0;
        gap: 20px;
      }
      .video-wrapper {
        width: min(80vw, 900px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .title-image {
        width: 400px;
        margin: 40px auto 30px auto;
      }
      .title-image img {
        width: 100%;
        height: auto;
        display: block;
      }
      iframe {
        width: 100%;
        max-width: 900px;
        aspect-ratio: 16 / 9;
        border: none;
      }
      .instagram-iframe {
        width: 100%;
        max-width: 900px;
        height: 840px;
        border: none;
      }
    </style>
  </head>
