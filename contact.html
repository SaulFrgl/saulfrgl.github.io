<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 112px 20px 20px;
        font-family: Arial, sans-serif;
        position: relative;
        overflow-y: scroll;
        overflow-x: hidden;
      }
      header {
        position: fixed;
        top: 4px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        line-height: 0;
        z-index: 10;
      }
      header a { display: block; }
      .saul-container {
        position: fixed;
        right: 4vw;
        bottom: 0;
        width: min(26vw, 30vh);
        aspect-ratio: 2282 / 955;
        background-image: url("assets/SAUL01 NO TABLE.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        cursor: pointer;
        z-index: 2;
        transition: background-image 0.3s ease;
      }
      .saul-container:hover {
        background-image: url("assets/SAUL02 NO TABLE.png");
      }
      @media (orientation: portrait) {
        .saul-container {
          right: 2vw;
          bottom: 0;
          width: min(44vw, 22vh);
        }
      }
      .title-container {
        position: relative;
        width: 360px;
        height: 94px;
        margin: 0 auto 4px;
        cursor: pointer;
      }
      .title-base, .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .contact-copy {
        max-width: 760px;
        margin: 40px auto 0;
        padding: 0 20px;
        font-size: clamp(1rem, 1.6vw, 1.35rem);
        line-height: 1.55;
        text-align: center;
        color: #20190f;
      }
      .contact-copy p {
        margin: 0 0 18px;
      }
      .contact-copy a {
        color: inherit;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      .contact-image {
        position: relative;
        width: min(42vw, 520px);
        aspect-ratio: 1 / 1;
        margin: 28px auto 0;
        cursor: pointer;
      }
      .contact-image-base,
      .contact-image-hover {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .contact-image-base {
        background-image: url("assets/contact me 01.png");
        opacity: 1;
      }
      .contact-image-hover {
        background-image: url("assets/contact me 02.png");
        opacity: 0;
      }
      .contact-image:hover .contact-image-base {
        opacity: 0;
      }
      .contact-image:hover .contact-image-hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <main class="contact-copy">
      <p>
        I’m always open to work (as long as I’m getting paid), I love animation the
        most but I’ve worked on storyboarding, 2D game concept art, comics…
        Basically anything to do with drawing, I’m down with!
      </p>
      <p>
        You can contact me at
        <a href="mailto:saulfrgl@gmail.com">saulfrgl@gmail.com</a>
      </p>
      <div class="contact-image" aria-label="Contact image">
        <div class="contact-image-base"></div>
        <div class="contact-image-hover"></div>
      </div>
    </main>
    <a href="index.html" aria-label="Saul image">
      <div class="saul-container"></div>
    </a>
  </body>
</html>
