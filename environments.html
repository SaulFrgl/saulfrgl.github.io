<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environments</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      header {
        display: flex;
        justify-content: center;
        line-height: 0;
      }
      header a {
        display: block;
      }
      .title-container {
        position: relative;
        width: 360px;
        height: 94px;
        margin: 0 auto 4px;
        cursor: pointer;
      }
      .title-base, .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <h1>Environments</h1>
    <p>Placeholder content.</p>
  </body>
</html>
