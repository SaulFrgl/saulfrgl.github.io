<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saul Frgl</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <link rel="preload" href="assets/CONTACT02.png" as="image" />
    <link rel="preload" href="assets/ENVIRONMENTS02.png" as="image" />
    <link rel="preload" href="assets/FIGURE02.png" as="image" />
    <link rel="preload" href="assets/TV02.png" as="image" />
    <link rel="preload" href="assets/STICKERS02.png" as="image" />
    <link rel="preload" href="assets/SAUL02 NO TABLE.png" as="image" />
    <link rel="preload" href="small_assets/channel02.png" as="image" />
    <link rel="preload" href="small_assets/PATREON02.png" as="image" />
    <link rel="preload" href="small_assets/STICKERS02.png" as="image" />
    <style>
      html {
        scrollbar-gutter: stable;
        overflow: hidden;
        height: 100%;
      }
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      header {
        position: fixed;
        top: 4px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        line-height: 0;
        z-index: 10;
      }
      header a { display: block; }
      .title-container {
        position: relative;
        width: min(945px, 90vw);
        height: 248px;
        margin: 0 auto 4px;
        cursor: pointer;
      }
      .title-base,
      .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .content-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .main-row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
      }
      .small-row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
        flex-wrap: wrap;
      }
      .image-container {
        position: relative;
        width: min(18vw, 28vh);
        height: min(18vw, 28vh);
        cursor: pointer;
      }
      .img-base,
      .img-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom center;
        transition: opacity 0.3s;
      }
      .img-base {
        opacity: 1;
      }
      .img-hover {
        opacity: 0;
      }
      .image-container:hover .img-base {
        opacity: 0;
      }
      .image-container:hover .img-hover {
        opacity: 1;
      }
      @media (orientation: portrait) {
        .image-container {
          width: min(86vw, 20vh);
          height: min(86vw, 20vh);
        }
        .animations {
          width: calc(min(86vw, 20vh) * 1.15);
          height: calc(min(86vw, 20vh) * 1.15);
        }
        .small-asset {
          width: min(46vw, 12vh);
          height: min(46vw, 12vh);
        }
      }
      .contact .img-base {
        background-image: url("assets/CONTACT01.png");
      }
      .contact .img-hover {
        background-image: url("assets/CONTACT02.png");
      }
      .environments .img-base {
        background-image: url("assets/ENVIRONMENTS01.png");
      }
      .environments .img-hover {
        background-image: url("assets/ENVIRONMENTS02.png");
      }
      .figure .img-base {
        background-image: url("assets/FIGURE01.png");
      }
      .figure .img-hover {
        background-image: url("assets/FIGURE02.png");
      }
      .animations {
        width: calc(min(18vw, 28vh) * 1.15);
        height: calc(min(18vw, 28vh) * 1.15);
      }
      .animations .img-base {
        background-image: url("assets/TV01.png");
      }
      .animations .img-hover {
        background-image: url("assets/TV02.png");
      }
      .small-asset {
        position: relative;
        width: min(12vw, 16vh);
        height: min(12vw, 16vh);
        cursor: pointer;
      }
      .small-base,
      .small-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom center;
        transition: opacity 0.3s;
      }
      .small-base {
        opacity: 1;
      }
      .small-hover {
        opacity: 0;
      }
      .small-asset:hover .small-base {
        opacity: 0;
      }
      .small-asset:hover .small-hover {
        opacity: 1;
      }
      .channel .small-base {
        background-image: url("small_assets/channel01.png");
      }
      .channel .small-hover {
        background-image: url("small_assets/channel02.png");
      }
      .patreon .small-base {
        background-image: url("small_assets/PATREON01.png");
      }
      .patreon .small-hover {
        background-image: url("small_assets/PATREON02.png");
      }
      .stickers-small .small-base {
        background-image: url("small_assets/STICKERS01.png");
      }
      .stickers-small .small-hover {
        background-image: url("small_assets/STICKERS02.png");
      }
      .saul-container {
        position: fixed;
        right: 4vw;
        bottom: 0;
        width: min(26vw, 30vh);
        aspect-ratio: 2282 / 955;
        cursor: pointer;
        z-index: 2;
      }
      .saul-base,
      .saul-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        transition: opacity 0.3s;
      }
      .saul-base {
        background-image: url("assets/SAUL01 NO TABLE.png");
        opacity: 1;
      }
      .saul-hover {
        background-image: url("assets/SAUL02 NO TABLE.png");
        opacity: 0;
      }
      .saul-container:hover .saul-base {
        opacity: 0;
      }
      .saul-container:hover .saul-hover {
        opacity: 1;
      }
      @media (orientation: portrait) {
        .saul-container {
          right: 2vw;
          bottom: 0;
          width: min(44vw, 22vh);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <div class="content-wrapper">
      <div class="main-row">
        <a href="animations.html">
          <div class="image-container animations">
            <div class="img-base"></div>
            <div class="img-hover"></div>
          </div>
        </a>
        <a href="figure.html">
          <div class="image-container figure">
            <div class="img-base"></div>
            <div class="img-hover"></div>
          </div>
        </a>
        <a href="environments.html">
          <div class="image-container environments">
            <div class="img-base"></div>
            <div class="img-hover"></div>
          </div>
        </a>
        <a href="contact.html">
          <div class="image-container contact">
            <div class="img-base"></div>
            <div class="img-hover"></div>
          </div>
        </a>
      </div>
      <div class="small-row">
        <a href="https://www.youtube.com/@saulfr">
          <div class="small-asset channel">
            <div class="small-base"></div>
            <div class="small-hover"></div>
          </div>
        </a>
        <a href="https://www.patreon.com/saulfr">
          <div class="small-asset patreon">
            <div class="small-base"></div>
            <div class="small-hover"></div>
          </div>
        </a>
        <a href="https://sauls.store">
          <div class="small-asset stickers-small">
            <div class="small-base"></div>
            <div class="small-hover"></div>
          </div>
        </a>
      </div>
    </div>
    <div class="saul-container" aria-label="Saul">
      <div class="saul-base"></div>
      <div class="saul-hover"></div>
    </div>
  </body>
</html>
