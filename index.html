<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saul Frgl</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <link rel="preload" href="assets/CONTACT02.png" as="image" />
    <link rel="preload" href="assets/ENVIRONMENTS02.png" as="image" />
    <link rel="preload" href="assets/FIGURE02.png" as="image" />
    <link rel="preload" href="assets/TV02.png" as="image" />
    <link rel="preload" href="assets/STICKERS02.png" as="image" />
    <link rel="preload" href="assets/SAUL02 NO TABLE.png" as="image" />
    <style>
      html {
        scrollbar-gutter: stable;
        overflow: hidden;
        height: 100%;
      }
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 112px 14px 10px;
        font-family: Arial, sans-serif;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      header {
        position: fixed;
        top: 4px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        line-height: 0;
        z-index: 10;
      }
      header a { display: block; }
      .title-container {
        position: relative;
        width: 360px;
        height: 94px;
        margin: 0 auto 4px;
        cursor: pointer;
      }
      .title-base,
      .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .grid {
        display: grid;
        gap: 0;
        justify-items: center;
        margin-top: -18px;
      }
      .row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 6px;
        flex-wrap: wrap;
      }
      .image-container {
        width: min(26vw, 36vh);
        height: min(26vw, 36vh);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom center;
        cursor: pointer;
        transition: background-image 0.3s;
      }
      @media (orientation: portrait) {
        .image-container {
          width: min(86vw, 20vh);
          height: min(86vw, 20vh);
        }
        .animations {
          width: calc(min(86vw, 20vh) * 1.15);
          height: calc(min(86vw, 20vh) * 1.15);
        }
      }
      .contact {
        background-image: url("assets/CONTACT01.png");
      }
      .contact:hover {
        background-image: url("assets/CONTACT02.png");
      }
      .environments {
        background-image: url("assets/ENVIRONMENTS01.png");
      }
      .environments:hover {
        background-image: url("assets/ENVIRONMENTS02.png");
      }
      .figure {
        background-image: url("assets/FIGURE01.png");
      }
      .figure:hover {
        background-image: url("assets/FIGURE02.png");
      }
      .animations {
        background-image: url("assets/TV01.png");
        width: calc(min(26vw, 36vh) * 1.15);
        height: calc(min(26vw, 36vh) * 1.15);
      }
      .animations:hover {
        background-image: url("assets/TV02.png");
      }
      .stickers {
        background-image: url("assets/STICKERS01.png");
      }
      .stickers:hover {
        background-image: url("assets/STICKERS02.png");
      }
      .saul-container {
        position: fixed;
        right: 4vw;
        bottom: 0;
        width: min(26vw, 30vh);
        aspect-ratio: 2282 / 955;
        background-image: url("assets/SAUL01 NO TABLE.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        cursor: pointer;
        z-index: 2;
        transition: background-image 0.3s ease;
      }
      .saul-container:hover {
        background-image: url("assets/SAUL02 NO TABLE.png");
      }
      @media (orientation: portrait) {
        .saul-container {
          right: 2vw;
          bottom: 0;
          width: min(44vw, 22vh);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <div class="grid">
      <div class="row top-row">
        <a href="animations.html">
          <div class="image-container animations"></div>
        </a>
        <a href="figure.html">
          <div class="image-container figure"></div>
        </a>
      </div>
      <div class="row bottom-row">
        <a href="environments.html">
          <div class="image-container environments"></div>
        </a>
        <a href="https://sauls.store">
          <div class="image-container stickers"></div>
        </a>
        <a href="contact.html">
          <div class="image-container contact"></div>
        </a>
      </div>
    </div>
    <a href="more_info.html" aria-label="More info about Saul">
      <div class="saul-container"></div>
    </a>
  </body>
</html>
