<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saul Frgl</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <link rel="preload" href="assets/CONTACT02.png" as="image" />
    <link rel="preload" href="assets/ENVIRONMENTS02.png" as="image" />
    <link rel="preload" href="assets/FIGURE02.png" as="image" />
    <link rel="preload" href="assets/TV02.png" as="image" />
    <style>
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      .title-container {
        position: relative;
        width: 40vw;
        height: 15vw;
        margin: 0 auto;
        cursor: pointer;
      }
      .title-base, .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        justify-items: center;
        margin-top: 20px;
      }
      .image-container {
        width: min(20vw, 30vh);
        height: min(20vw, 30vh);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        cursor: pointer;
        transition: background-image 0.3s;
      }
      .image-container:nth-child(2) {
        transform: translateX(20px);
      }
      .image-container:nth-child(3) {
        transform: translateY(20px);
      }
      .image-container:nth-child(4) {
        transform: translateX(20px) translateY(20px);
      }
      .contact {
        background-image: url("assets/CONTACT01.png");
      }
      .contact:hover {
        background-image: url("assets/CONTACT02.png");
      }
      .environments {
        background-image: url("assets/ENVIRONMENTS01.png");
      }
      .environments:hover {
        background-image: url("assets/ENVIRONMENTS02.png");
      }
      .figure {
        background-image: url("assets/FIGURE01.png");
      }
      .figure:hover {
        background-image: url("assets/FIGURE02.png");
      }
      .animations {
        background-image: url("assets/TV01.png");
      }
      .animations:hover {
        background-image: url("assets/TV02.png");
      }
    </style>
  </head>
  <body>
    <header>
        <a href="index.html">
            <div class="title-container">
                <div class="title-base"></div>
                <div class="title-hover"></div>
            </div>
        </a>
    </header>
    <div class="grid">
      <a href="animations.html">
        <div class="image-container animations"></div>
      </a>
      <a href="figure.html">
        <div class="image-container figure"></div>
      </a>
      <a href="environments.html">
        <div class="image-container environments"></div>
      </a>
      <a href="contact.html">
        <div class="image-container contact"></div>
      </a>
    </div>
  </body>
</html>
