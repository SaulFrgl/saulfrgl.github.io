<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saul Frgl</title>
    <link rel="icon" href="assets/ICON.png" type="image/png" />
    <link rel="preload" href="assets/CONTACT02.png" as="image" />
    <link rel="preload" href="assets/ENVIRONMENTS02.png" as="image" />
    <link rel="preload" href="assets/FIGURE02.png" as="image" />
    <link rel="preload" href="assets/TV02.png" as="image" />
    <link rel="preload" href="assets/STICKERS02.png" as="image" />
    <style>
      body {
        background-image: url("assets/background.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      .title-container {
        position: relative;
        width: 40vw;
        height: 15vw;
        margin: 0 auto;
        cursor: pointer;
      }
      .title-base,
      .title-hover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.3s;
      }
      .title-base {
        background-image: url("assets/NAME01.png");
        opacity: 1;
      }
      .title-hover {
        background-image: url("assets/NAME02.png");
        opacity: 0;
      }
      .title-container:hover .title-base {
        opacity: 0;
      }
      .title-container:hover .title-hover {
        opacity: 1;
      }
      .grid {
        display: grid;
        gap: 20px;
        justify-items: center;
        margin-top: 20px;
      }
      .row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 20px;
        flex-wrap: wrap;
      }
      .image-container {
        width: min(20vw, 30vh);
        height: min(20vw, 30vh);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom center;
        cursor: pointer;
        transition: background-image 0.3s;
      }
      @media (orientation: portrait) {
        .image-container {
          width: min(80vw, 15vh);
          height: min(80vw, 15vh);
        }
      }
      .contact {
        background-image: url("assets/CONTACT01.png");
      }
      .contact:hover {
        background-image: url("assets/CONTACT02.png");
      }
      .environments {
        background-image: url("assets/ENVIRONMENTS01.png");
      }
      .environments:hover {
        background-image: url("assets/ENVIRONMENTS02.png");
      }
      .figure {
        background-image: url("assets/FIGURE01.png");
      }
      .figure:hover {
        background-image: url("assets/FIGURE02.png");
      }
      .animations {
        background-image: url("assets/TV01.png");
      }
      .animations:hover {
        background-image: url("assets/TV02.png");
      }
      .stickers {
        background-image: url("assets/STICKERS01.png");
      }
      .stickers:hover {
        background-image: url("assets/STICKERS02.png");
      }
      .saul-line {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 8vw;
        min-height: 56px;
        max-height: 120px;
        background-image: url("assets/TABLE LINE.png");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: bottom center;
        pointer-events: none;
        z-index: 1;
      }
      .saul-container {
        position: fixed;
        right: 4vw;
        bottom: 0;
        width: min(28vw, 34vh);
        aspect-ratio: 1 / 1;
        background-image: url("assets/SAUL01 NO TABLE.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        cursor: pointer;
        z-index: 2;
        transition: background-image 0.3s ease;
      }
      .saul-container:hover {
        background-image: url("assets/SAUL02 NO TABLE.png");
      }
      @media (orientation: portrait) {
        .saul-container {
          right: 2vw;
          width: min(52vw, 26vh);
        }
        .saul-line {
          height: 10vw;
          min-height: 42px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html">
        <div class="title-container">
          <div class="title-base"></div>
          <div class="title-hover"></div>
        </div>
      </a>
    </header>
    <div class="grid">
      <div class="row top-row">
        <a href="animations.html">
          <div class="image-container animations"></div>
        </a>
        <a href="figure.html">
          <div class="image-container figure"></div>
        </a>
      </div>
      <div class="row bottom-row">
        <a href="environments.html">
          <div class="image-container environments"></div>
        </a>
        <a href="https://sauls.store">
          <div class="image-container stickers"></div>
        </a>
        <a href="contact.html">
          <div class="image-container contact"></div>
        </a>
      </div>
    </div>
    <a href="index.html" aria-label="Saul image">
      <div class="saul-container"></div>
    </a>
    <div class="saul-line"></div>
  </body>
</html>
